name: Build and Push (GHCR)

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/flask-cloud

concurrency:
  group: push-ghcr-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./flask-app
          file: ./flask-app/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

# Notes:
# - This workflow uses GHCR (GitHub Container Registry). Images will be published to:
#     ghcr.io/<owner>/flask-cloud:<tag>
# - You can see published packages under your GitHub profile/org: Packages tab.
# - No extra secrets are required; GITHUB_TOKEN with packages:write is used.
# - To switch to Docker Hub:
#     1) Create repo secrets: DOCKERHUB_USERNAME and DOCKERHUB_TOKEN (PAT).
#     2) Replace the login step with:
#          uses: docker/login-action@v3
#          with:
#            username: ${{ secrets.DOCKERHUB_USERNAME }}
#            password: ${{ secrets.DOCKERHUB_TOKEN }}
#     3) Set:
#          env:
#            REGISTRY: docker.io
#            IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/flask-cloud
# - To use AWS ECR, replace the login step with aws-actions/amazon-ecr-login and
#   set IMAGE_NAME to <aws_account_id>.dkr.ecr.<region>.amazonaws.com/flask-cloud
